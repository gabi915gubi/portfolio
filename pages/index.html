<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio</title>
    <link rel="stylesheet" href="../Style/style.css">
</head>

<body>

    <h1>Meu Portfólio de Desenvolvedor</h1>

    <section>
        <h3>Digite seu nome</h3>
        <input type="text" id="nomeInput" placeholder="Digite seu nome">
        <button id="btnNome">Mostrar Nome</button>
        <p id="resultadoNome"></p>
    </section>

    <hr>

    <section>
        <h2 id="meuNome"></h2>
        <p id="minhaBio"></p>
        <p id="curso"></p>
        <p id="instituicao"></p>
    </section>

    <hr>

    <section id="quiz-container">
        <h3>Descubra seu Perfil Tech</h3>
        <button id="btn-visual">🎨 Front-End</button>
        <button id="btn-logica">⚙️ Back-End</button>
        <div id="resultado-quiz"></div>
    </section>

    <hr>

    <section>
        <p id="tempoRestante"></p>
        <p id="statusNota"></p>
        <p id="diaAtual"></p>
    </section>

    <hr>

    <section>
        <h3>Habilidades</h3>
        <ul id="lista-habilidades"></ul>
    </section>

    <hr>

    <section>
        <h3>Meus Projetos</h3>
        <div id="lista-projetos"></div>
    </section>

    <hr>

    <section>
        <h3>Frase Motivacional</h3>
        <button id="buscar-frase">Buscar Frase</button>
        <button id="traduzir-frase" disabled>Traduzir Frase</button>
        <h2 id="resultado-frase">Clique no botão</h2>
    </section>

    <hr>

    <button id="modo">Modo Escuro</button>

    <script src="../Script/script.js"></script>

</body>

</html>
